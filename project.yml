name: BlackmagicControl
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.local
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  BlackmagicControl:
    type: application
    platform: iOS
    sources:
      - BlackmagicControl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.krishnanelloore.camcontrolpro
        INFOPLIST_FILE: BlackmagicControl/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 2
        SUPPORTS_MACCATALYST: false
  BlackmagicControlTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BlackmagicControlTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: BlackmagicControl
schemes:
  BlackmagicControl:
    build:
      targets:
        BlackmagicControl: all
        BlackmagicControlTests: [test]
    run:
      config: Debug
      executable: BlackmagicControl
    test:
      config: Debug
      targets:
        - BlackmagicControlTests
